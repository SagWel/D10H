services:
  db:
    image: mysql:8.0
    container_name: d10h_mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: d10h_database
      MYSQL_USER: dev_docker
      MYSQL_PASSWORD: d0ck3rD3vPassw0rd
      MYSQL_ROOT_PASSWORD: NRJ110113
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: d10h_backend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./server:/var/www/html
    depends_on:
      - db

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: d10h_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: